name: Gerar APK DK Online

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "www/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Instalar dependências
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm install --no-audit --no-fund --package-lock=false
          npm install --no-audit --no-fund --package-lock=false --save-dev typescript
      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Gerar APK de teste
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: DK-Online-APK-Teste
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
